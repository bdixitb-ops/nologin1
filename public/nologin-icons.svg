<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" style="background:#0a0a0a">

  <!-- LABELS -->
  <text x="60" y="22" fill="#555" font-size="10" font-family="monospace" text-anchor="middle">any-device</text>
  <text x="170" y="22" fill="#555" font-size="10" font-family="monospace" text-anchor="middle">file-text</text>
  <text x="280" y="22" fill="#555" font-size="10" font-family="monospace" text-anchor="middle">auto-expiry</text>
  <text x="390" y="22" fill="#555" font-size="10" font-family="monospace" text-anchor="middle">password</text>
  <text x="500" y="22" fill="#555" font-size="10" font-family="monospace" text-anchor="middle">edit-lock</text>
  <text x="610" y="22" fill="#555" font-size="10" font-family="monospace" text-anchor="middle">collaborate</text>

  <!-- ROW 1: Large 64x64 versions -->

  <!-- 1. Any device icon -->
  <g transform="translate(28, 36)">
    <!-- laptop -->
    <rect x="0" y="6" width="38" height="26" rx="3" fill="none" stroke="#7c6ff7" stroke-width="2.2"/>
    <rect x="4" y="10" width="30" height="18" rx="1" fill="#7c6ff7" opacity="0.1"/>
    <rect x="-4" y="32" width="46" height="5" rx="2" fill="none" stroke="#7c6ff7" stroke-width="2"/>
    <!-- phone -->
    <rect x="42" y="12" width="18" height="28" rx="3" fill="none" stroke="#7c6ff7" stroke-width="2"/>
    <circle cx="51" cy="36" r="2.5" fill="none" stroke="#7c6ff7" stroke-width="1.5"/>
    <rect x="46" y="16" width="10" height="14" rx="1" fill="#7c6ff7" opacity="0.1"/>
  </g>

  <!-- 2. File + text icon -->
  <g transform="translate(138, 36)">
    <!-- document -->
    <path d="M8 2 L28 2 L36 12 L36 54 L8 54 Z" fill="none" stroke="#7c6ff7" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M28 2 L28 12 L36 12" fill="none" stroke="#7c6ff7" stroke-width="2" stroke-linejoin="round"/>
    <!-- text lines -->
    <line x1="14" y1="24" x2="30" y2="24" stroke="#7c6ff7" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="32" x2="30" y2="32" stroke="#7c6ff7" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="40" x2="24" y2="40" stroke="#7c6ff7" stroke-width="2" stroke-linecap="round"/>
    <!-- upload arrow -->
    <circle cx="46" cy="44" r="14" fill="none" stroke="#7c6ff7" stroke-width="2" opacity="0.4"/>
    <line x1="46" y1="50" x2="46" y2="36" stroke="#7c6ff7" stroke-width="2" stroke-linecap="round"/>
    <path d="M40 43 L46 36 L52 43" fill="none" stroke="#7c6ff7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 3. Auto expiry / clock icon -->
  <g transform="translate(248, 36)">
    <!-- clock circle -->
    <circle cx="30" cy="30" r="26" fill="none" stroke="#7c6ff7" stroke-width="2.2"/>
    <!-- clock hands -->
    <line x1="30" y1="30" x2="30" y2="14" stroke="#7c6ff7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="42" y2="38" stroke="#7c6ff7" stroke-width="2.5" stroke-linecap="round"/>
    <!-- center dot -->
    <circle cx="30" cy="30" r="3" fill="#7c6ff7"/>
    <!-- small notch top -->
    <line x1="30" y1="4" x2="30" y2="8" stroke="#7c6ff7" stroke-width="2.5" stroke-linecap="round"/>
    <!-- auto-delete arc at top right -->
    <path d="M48 12 Q56 4 52 18" fill="none" stroke="#7c6ff7" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M52 18 L48 14 M52 18 L56 15" fill="none" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- 4. Password protect / lock icon -->
  <g transform="translate(358, 36)">
    <!-- lock body -->
    <rect x="8" y="26" width="44" height="32" rx="5" fill="none" stroke="#7c6ff7" stroke-width="2.2"/>
    <!-- shackle -->
    <path d="M16 26 L16 16 Q16 4 30 4 Q44 4 44 16 L44 26" fill="none" stroke="#7c6ff7" stroke-width="2.2" stroke-linecap="round"/>
    <!-- keyhole circle -->
    <circle cx="30" cy="40" r="6" fill="none" stroke="#7c6ff7" stroke-width="2"/>
    <!-- keyhole stem -->
    <line x1="30" y1="46" x2="30" y2="52" stroke="#7c6ff7" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 5. Edit lock / shield check icon -->
  <g transform="translate(468, 36)">
    <!-- shield -->
    <path d="M30 2 L54 12 L54 34 Q54 50 30 58 Q6 50 6 34 L6 12 Z" fill="none" stroke="#7c6ff7" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- checkmark inside -->
    <path d="M18 30 L26 38 L42 20" fill="none" stroke="#7c6ff7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 6. Collaborate / people icon -->
  <g transform="translate(578, 36)">
    <!-- person 1 left -->
    <circle cx="18" cy="16" r="10" fill="none" stroke="#7c6ff7" stroke-width="2.2"/>
    <path d="M2 54 Q2 36 18 36 Q34 36 34 54" fill="none" stroke="#7c6ff7" stroke-width="2.2" stroke-linecap="round"/>
    <!-- person 2 right -->
    <circle cx="42" cy="16" r="10" fill="none" stroke="#7c6ff7" stroke-width="2.2" opacity="0.5"/>
    <path d="M26 54 Q26 36 42 36 Q58 36 58 54" fill="none" stroke="#7c6ff7" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>
    <!-- link/connect line between -->
    <line x1="28" y1="16" x2="32" y2="16" stroke="#7c6ff7" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- DIVIDER -->
  <line x1="20" y1="118" x2="620" y2="118" stroke="#1a1a1a" stroke-width="1"/>

  <!-- LABEL ROW 2 -->
  <text x="380" y="140" fill="#7c6ff7" font-size="10" font-family="monospace">MEDIUM — 40x40</text>

  <!-- ROW 2: Medium 40x40 versions -->

  <!-- any-device 40px -->
  <g transform="translate(34, 152)">
    <rect x="0" y="4" width="24" height="16" rx="2" fill="none" stroke="#7c6ff7" stroke-width="1.8"/>
    <rect x="2" y="6" width="20" height="11" rx="0.8" fill="#7c6ff7" opacity="0.1"/>
    <rect x="-3" y="20" width="30" height="3.5" rx="1.5" fill="none" stroke="#7c6ff7" stroke-width="1.6"/>
    <rect x="28" y="8" width="11" height="17" rx="2" fill="none" stroke="#7c6ff7" stroke-width="1.8"/>
    <circle cx="33.5" cy="22" r="1.8" fill="none" stroke="#7c6ff7" stroke-width="1.2"/>
  </g>

  <!-- file-text 40px -->
  <g transform="translate(148, 152)">
    <path d="M4 2 L18 2 L24 8 L24 36 L4 36 Z" fill="none" stroke="#7c6ff7" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M18 2 L18 8 L24 8" fill="none" stroke="#7c6ff7" stroke-width="1.6"/>
    <line x1="8" y1="16" x2="20" y2="16" stroke="#7c6ff7" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="8" y1="22" x2="20" y2="22" stroke="#7c6ff7" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="8" y1="28" x2="15" y2="28" stroke="#7c6ff7" stroke-width="1.6" stroke-linecap="round"/>
    <!-- plus upload badge -->
    <circle cx="28" cy="28" r="9" fill="#0a0a0a" stroke="#7c6ff7" stroke-width="1.6"/>
    <line x1="28" y1="23" x2="28" y2="33" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="23" y1="28" x2="33" y2="28" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- expiry 40px -->
  <g transform="translate(258, 152)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#7c6ff7" stroke-width="1.8"/>
    <line x1="20" y1="20" x2="20" y2="8" stroke="#7c6ff7" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="28" y2="26" stroke="#7c6ff7" stroke-width="2" stroke-linecap="round"/>
    <circle cx="20" cy="20" r="2.5" fill="#7c6ff7"/>
    <line x1="20" y1="2" x2="20" y2="5" stroke="#7c6ff7" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- password 40px -->
  <g transform="translate(368, 152)">
    <rect x="4" y="17" width="30" height="22" rx="3.5" fill="none" stroke="#7c6ff7" stroke-width="1.8"/>
    <path d="M10 17 L10 11 Q10 2 19 2 Q28 2 28 11 L28 17" fill="none" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="19" cy="27" r="4" fill="none" stroke="#7c6ff7" stroke-width="1.6"/>
    <line x1="19" y1="31" x2="19" y2="35" stroke="#7c6ff7" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- edit-lock 40px -->
  <g transform="translate(478, 152)">
    <path d="M19 2 L36 9 L36 22 Q36 33 19 38 Q2 33 2 22 L2 9 Z" fill="none" stroke="#7c6ff7" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M11 20 L17 26 L28 13" fill="none" stroke="#7c6ff7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- collaborate 40px -->
  <g transform="translate(578, 152)">
    <circle cx="13" cy="11" r="7" fill="none" stroke="#7c6ff7" stroke-width="1.8"/>
    <path d="M1 36 Q1 24 13 24 Q25 24 25 36" fill="none" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="29" cy="11" r="7" fill="none" stroke="#7c6ff7" stroke-width="1.8" opacity="0.5"/>
    <path d="M17 36 Q17 24 29 24 Q41 24 41 36" fill="none" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- DIVIDER -->
  <line x1="20" y1="230" x2="620" y2="230" stroke="#1a1a1a" stroke-width="1"/>

  <!-- LABEL ROW 3 -->
  <text x="380" y="252" fill="#7c6ff7" font-size="10" font-family="monospace">SMALL — 24x24</text>

  <!-- ROW 3: Small 24x24 versions -->

  <!-- any-device 24px -->
  <g transform="translate(40, 264)">
    <rect x="0" y="2" width="14" height="10" rx="1.5" fill="none" stroke="#7c6ff7" stroke-width="1.5"/>
    <rect x="-2" y="12" width="18" height="2.5" rx="1" fill="none" stroke="#7c6ff7" stroke-width="1.3"/>
    <rect x="17" y="4" width="7" height="11" rx="1.5" fill="none" stroke="#7c6ff7" stroke-width="1.5"/>
    <circle cx="20.5" cy="12.5" r="1.2" fill="none" stroke="#7c6ff7" stroke-width="1"/>
  </g>

  <!-- file-text 24px -->
  <g transform="translate(152, 264)">
    <path d="M2 1 L11 1 L15 5 L15 22 L2 22 Z" fill="none" stroke="#7c6ff7" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M11 1 L11 5 L15 5" fill="none" stroke="#7c6ff7" stroke-width="1.3"/>
    <line x1="4" y1="9" x2="13" y2="9" stroke="#7c6ff7" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="4" y1="13" x2="13" y2="13" stroke="#7c6ff7" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="4" y1="17" x2="9" y2="17" stroke="#7c6ff7" stroke-width="1.3" stroke-linecap="round"/>
  </g>

  <!-- expiry 24px -->
  <g transform="translate(262, 264)">
    <circle cx="12" cy="12" r="10" fill="none" stroke="#7c6ff7" stroke-width="1.5"/>
    <line x1="12" y1="12" x2="12" y2="5" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="17" y2="15" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="12" cy="12" r="1.8" fill="#7c6ff7"/>
  </g>

  <!-- password 24px -->
  <g transform="translate(372, 264)">
    <rect x="2" y="10" width="18" height="14" rx="2.5" fill="none" stroke="#7c6ff7" stroke-width="1.5"/>
    <path d="M6 10 L6 7 Q6 2 11 2 Q16 2 16 7 L16 10" fill="none" stroke="#7c6ff7" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="11" cy="16" r="2.5" fill="none" stroke="#7c6ff7" stroke-width="1.3"/>
    <line x1="11" y1="18.5" x2="11" y2="21" stroke="#7c6ff7" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- edit-lock 24px -->
  <g transform="translate(482, 264)">
    <path d="M11 1 L21 5 L21 13 Q21 20 11 23 Q1 20 1 13 L1 5 Z" fill="none" stroke="#7c6ff7" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M6 12 L10 16 L17 8" fill="none" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- collaborate 24px -->
  <g transform="translate(584, 264)">
    <circle cx="8" cy="7" r="4.5" fill="none" stroke="#7c6ff7" stroke-width="1.5"/>
    <path d="M1 22 Q1 15 8 15 Q15 15 15 22" fill="none" stroke="#7c6ff7" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="18" cy="7" r="4.5" fill="none" stroke="#7c6ff7" stroke-width="1.5" opacity="0.5"/>
    <path d="M11 22 Q11 15 18 15 Q25 15 25 22" fill="none" stroke="#7c6ff7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- DIVIDER -->
  <line x1="20" y1="310" x2="620" y2="310" stroke="#1a1a1a" stroke-width="1"/>

  <!-- ON CARD PREVIEW -->
  <text x="380" y="332" fill="#7c6ff7" font-size="10" font-family="monospace">PREVIEW ON CARD</text>

  <!-- 6 cards with icons -->
  <g transform="translate(20, 344)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="90" height="100" rx="6" fill="#0f0f0f" stroke="#1a1a1a" stroke-width="0.8"/>
    <rect x="10" y="12" width="26" height="26" rx="6" fill="#15122a"/>
    <rect x="14" y="16" width="14" height="10" rx="1.5" fill="none" stroke="#7c6ff7" stroke-width="1.5"/>
    <rect x="12" y="26" width="18" height="2.5" rx="1" fill="none" stroke="#7c6ff7" stroke-width="1.2"/>
    <rect x="30" y="18" width="7" height="11" rx="1.5" fill="none" stroke="#7c6ff7" stroke-width="1.5"/>
    <circle cx="33.5" cy="26" r="1.2" fill="none" stroke="#7c6ff7" stroke-width="1"/>
    <text x="10" y="54" fill="#ccc" font-size="9" font-family="sans-serif" font-weight="500">Any device</text>
    <text x="10" y="66" fill="#333" font-size="7.5" font-family="sans-serif">Same page name on</text>
    <text x="10" y="76" fill="#333" font-size="7.5" font-family="sans-serif">any device.</text>

    <!-- Card 2 -->
    <rect x="98" y="0" width="90" height="100" rx="6" fill="#0f0f0f" stroke="#1a1a1a" stroke-width="0.8"/>
    <rect x="108" y="12" width="26" height="26" rx="6" fill="#15122a"/>
    <path d="M112 14 L120 14 L124 18 L124 36 L112 36 Z" fill="none" stroke="#7c6ff7" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M120 14 L120 18 L124 18" fill="none" stroke="#7c6ff7" stroke-width="1.3"/>
    <line x1="114" y1="22" x2="122" y2="22" stroke="#7c6ff7" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="114" y1="26" x2="122" y2="26" stroke="#7c6ff7" stroke-width="1.3" stroke-linecap="round"/>
    <text x="108" y="54" fill="#ccc" font-size="9" font-family="sans-serif" font-weight="500">Text + files</text>
    <text x="108" y="66" fill="#333" font-size="7.5" font-family="sans-serif">Upload files and text</text>
    <text x="108" y="76" fill="#333" font-size="7.5" font-family="sans-serif">on one page.</text>

    <!-- Card 3 -->
    <rect x="196" y="0" width="90" height="100" rx="6" fill="#0f0f0f" stroke="#1a1a1a" stroke-width="0.8"/>
    <rect x="206" y="12" width="26" height="26" rx="6" fill="#15122a"/>
    <circle cx="219" cy="25" r="10" fill="none" stroke="#7c6ff7" stroke-width="1.5"/>
    <line x1="219" y1="25" x2="219" y2="18" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="219" y1="25" x2="224" y2="28" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="219" cy="25" r="1.8" fill="#7c6ff7"/>
    <text x="206" y="54" fill="#ccc" font-size="9" font-family="sans-serif" font-weight="500">Auto expiry</text>
    <text x="206" y="66" fill="#333" font-size="7.5" font-family="sans-serif">Content deletes</text>
    <text x="206" y="76" fill="#333" font-size="7.5" font-family="sans-serif">automatically.</text>

    <!-- Card 4 -->
    <rect x="294" y="0" width="90" height="100" rx="6" fill="#0f0f0f" stroke="#1a1a1a" stroke-width="0.8"/>
    <rect x="304" y="12" width="26" height="26" rx="6" fill="#15122a"/>
    <rect x="308" y="22" width="18" height="14" rx="2.5" fill="none" stroke="#7c6ff7" stroke-width="1.5"/>
    <path d="M312 22 L312 18 Q312 13 317 13 Q322 13 322 18 L322 22" fill="none" stroke="#7c6ff7" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="317" cy="28" r="2.5" fill="none" stroke="#7c6ff7" stroke-width="1.3"/>
    <line x1="317" y1="30.5" x2="317" y2="33" stroke="#7c6ff7" stroke-width="1.5" stroke-linecap="round"/>
    <text x="304" y="54" fill="#ccc" font-size="9" font-family="sans-serif" font-weight="500">Password lock</text>
    <text x="304" y="66" fill="#333" font-size="7.5" font-family="sans-serif">Restrict who can</text>
    <text x="304" y="76" fill="#333" font-size="7.5" font-family="sans-serif">view your page.</text>

    <!-- Card 5 -->
    <rect x="392" y="0" width="90" height="100" rx="6" fill="#0f0f0f" stroke="#1a1a1a" stroke-width="0.8"/>
    <rect x="402" y="12" width="26" height="26" rx="6" fill="#15122a"/>
    <path d="M415 14 L425 18 L425 26 Q425 33 415 36 Q405 33 405 26 L405 18 Z" fill="none" stroke="#7c6ff7" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M410 25 L414 29 L421 21" fill="none" stroke="#7c6ff7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="402" y="54" fill="#ccc" font-size="9" font-family="sans-serif" font-weight="500">Edit lock</text>
    <text x="402" y="66" fill="#333" font-size="7.5" font-family="sans-serif">View only. No</text>
    <text x="402" y="76" fill="#333" font-size="7.5" font-family="sans-serif">edits allowed.</text>

    <!-- Card 6 -->
    <rect x="490" y="0" width="90" height="100" rx="6" fill="#0f0f0f" stroke="#1a1a1a" stroke-width="0.8"/>
    <rect x="500" y="12" width="26" height="26" rx="6" fill="#15122a"/>
    <circle cx="510" cy="21" r="5" fill="none" stroke="#7c6ff7" stroke-width="1.5"/>
    <path d="M504 36 Q504 28 510 28 Q516 28 516 36" fill="none" stroke="#7c6ff7" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="520" cy="21" r="5" fill="none" stroke="#7c6ff7" stroke-width="1.5" opacity="0.5"/>
    <path d="M514 36 Q514 28 520 28 Q526 28 526 36" fill="none" stroke="#7c6ff7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <text x="500" y="54" fill="#ccc" font-size="9" font-family="sans-serif" font-weight="500">Collaborate</text>
    <text x="500" y="66" fill="#333" font-size="7.5" font-family="sans-serif">Share and work</text>
    <text x="500" y="76" fill="#333" font-size="7.5" font-family="sans-serif">together live.</text>

  </g>

</svg>
